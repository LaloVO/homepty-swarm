services:
  homepty-swarm:
    image: ghcr.io/lalovo/homepty-swarm:latest
    # Mirror image (replace above URL if pulling is slow)
    # image: ghcr.nju.edu.cn/lalovo/homepty-swarm:latest
    container_name: homepty-swarm
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads